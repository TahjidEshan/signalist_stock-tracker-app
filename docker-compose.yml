# Signalist full stack for the Mac mini.
#
#   app     – the Next.js app (serves the UI + /api/inngest endpoint)
#   mongo   – MongoDB for auth, watchlists, and stored signals
#   inngest – Inngest dev server that discovers the app's functions and fires
#             the cron (scanMarketSignals) + welcome/news events
#
# Ollama runs on the HOST Mac mini (bare metal, not a container), reached via
# host.docker.internal — the same way your ollama-stack/n8n reaches it.
#
# This is a SEPARATE stack from ollama-stack; it shares only the host Ollama.
#
# Usage:
#   cp .env.example .env      # fill in FINNHUB_API_KEY, TELEGRAM_*, etc.
#   docker compose up -d --build

services:
  mongo:
    image: mongo:7
    container_name: signalist-mongo
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - mongo-data:/data/db
    # Not published to the host — only the app (same network) needs it.
    # Uncomment to reach it from host tools, but note ollama-stack's postgres
    # is separate; this mongo is dedicated to signalist.
    # ports:
    #   - "27018:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signalist-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: signalist-app
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "3000:3000"
    extra_hosts:
      # Reach bare-metal Ollama on the host (proven working by your n8n stack).
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      # Mongo lives in this compose network.
      MONGODB_URI: mongodb://mongo:27017/signalist
      # Bare-metal Ollama on the host.
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      # Inngest dev server URL (same compose network).
      INNGEST_DEV: "1"
      INNGEST_BASE_URL: http://inngest:8288
      # --- passthrough from .env ---
      FINNHUB_API_KEY: ${FINNHUB_API_KEY}
      NEXT_PUBLIC_FINNHUB_API_KEY: ${NEXT_PUBLIC_FINNHUB_API_KEY}
      NODEMAILER_EMAIL: ${NODEMAILER_EMAIL}
      NODEMAILER_PASSWORD: ${NODEMAILER_PASSWORD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      # Hourly, weekdays, roughly US market hours (13-20 UTC ≈ 9am-4pm ET).
      # Cron can't skip market holidays; those runs just find nothing. Harmless.
      SIGNAL_SCAN_CRON: ${SIGNAL_SCAN_CRON:-0 13-20 * * 1-5}
      REDDIT_SUBREDDITS: ${REDDIT_SUBREDDITS:-wallstreetbets,stocks,options,StockMarket,investing}
      REDDIT_USER_AGENT: ${REDDIT_USER_AGENT:-signalist-scanner/1.0 (personal use)}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-signalist-scanner (contact: set SEC_USER_AGENT)}
      TWITTER_ENABLED: ${TWITTER_ENABLED:-false}
      TWITTER_NITTER_INSTANCE: ${TWITTER_NITTER_INSTANCE:-}
      TWITTER_QUERIES: ${TWITTER_QUERIES:-$$SPY,$$QQQ,stocks}
    networks:
      - signalist-net

  inngest:
    image: inngest/inngest:latest
    container_name: signalist-inngest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      - app
    # Discover scanMarketSignals at the app's endpoint and fire its cron.
    command: >-
      inngest dev -u http://app:3000/api/inngest --no-discovery
    ports:
      - "8288:8288"          # Inngest dashboard: http://localhost:8288
    networks:
      - signalist-net

volumes:
  mongo-data:

networks:
  signalist-net:
    driver: bridge
